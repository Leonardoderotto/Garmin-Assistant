<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Neuer An-/Aus-Schalter -->
        <div class="power-control">
            <span class="power-label">System</span>
            <label class="switch">
                <input type="checkbox" id="powerSwitch">
                <span class="slider"></span>
            </label>
        </div>

        <h1 class="title">GARMIN</h1>
        <div class="orb" id="orb"></div>
        <p class="status" id="status">System ist AUS</p>
        <p class="output" id="output"></p>
    </div>
    <script src="index.js"></script>
</body>
</html>
