<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="star-field" class="star-field"></div>

    <button id="settingsBtn" class="settings-btn" title="Einstellungen">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <button id="fullscreenBtn" class="fullscreen-btn" title="Vollbild umschalten">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
        </svg>
    </button>

    <div class="container">
        <div class="power-control">
            <span class="power-label">Core System</span>
            <label class="switch">
                <input type="checkbox" id="powerSwitch">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="terminal-layout">
            <div class="side-panel left-panel" id="leftOutput"></div>

            <div class="core-wrapper">
                <div class="core-ring outer-ring" id="outerRing"></div>
                
                <div class="core-ring middle-ring" id="middleRing">
                    <div class="radar-dot" id="radarDot"></div>
                </div>
                
                <canvas id="visualizerCanvas" class="visualizer-canvas"></canvas>
                
                <div class="orb" id="orb"></div>
                <h1 class="core-title" id="coreTitle">G.A.R.M.I.N</h1>
            </div>

            <div class="side-panel right-panel" id="rightOutput"></div>
        </div>

        <p class="status" id="status">System offline</p>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 class="modal-title">System-Konfiguration</h2>
            <p class="modal-desc">Füge deinen OpenAI API-Schlüssel ein, um die kognitiven Kernfunktionen von Garmin zu aktivieren.</p>
            <input type="password" id="apiKeyInput" placeholder="sk-..." />
            <div class="modal-actions">
                <button id="closeModalBtn" class="modal-btn secondary">Abbrechen</button>
                <button id="saveApiKeyBtn" class="modal-btn primary">Speichern</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
